<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<form action="/" >
    <input type="text" name="search">
    <button type="submit">Search</button>
</form>
<ul>
    <li th:each=" a : ${animals.content}" th:text="|${a.name} - ${a.age}|"></li>
</ul>

<nav aria-label="Page navigation">
    <ul class="pagination">
        <li th:class="|page-item ${animals.number == 0 ? 'disabled' : ''}|">
            <a class="page-link" th:href="@{|?page=${animals.number - 1}|}" aria-label="Previous">
                <span aria-hidden="true">&laquo;</span>
                <span class="sr-only">Previous</span>
            </a>
        </li>
        <!-- class active là đang màu xanh là trang hiện tại -->
<!--        <li class="page-item active"><a class="page-link" href="#"></a></li>-->
        <li th:each=" p : ${#numbers.sequence(1,animals.totalPages)} " th:class="${animals.number + 1 == p ? 'page-item active' : 'page-item'}">
            <a class="page-link" th:href="@{|?page=${p - 1}|}" th:text="${p}"></a>
        </li>

        <li th:class="|page-item ${animals.number == animals.totalPages - 1 ? 'disabled' : ''}|">
            <a class="page-link" th:href="@{|?page=${animals.number + 1}|}" aria-label="Next">
                <span aria-hidden="true">&raquo;</span>
                <span class="sr-only">Next</span>
            </a>
        </li>
    </ul>
</nav>


<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
