<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<ul>
   <li th:each=" h : ${histories}">
       <p th:text="${h.id}"></p>
       <p th:text="${h.amount}"></p>
       <p th:text="${h.message}"></p>
       <p th:text="${h.transactionTime}"></p>
       <p th:text="${h.account.name}"></p>
   </li>
</ul>

</body>
</html>
