<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form th:action="@{/banking}" method="post">
    <div>
        <label for="">Sender</label> <br>
        <input type="text" name="senderId">
    </div>
    <div>
        <label for="">Receive</label> <br>
        <input type="text" name="receiveId">
    </div>
    <div>
        <label for="">Amount</label> <br>
        <input type="text" name="amount">
    </div>
    <button type="submit">Submit</button>
</form>

</body>
</html>
